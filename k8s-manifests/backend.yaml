apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  namespace: devops-roadmap
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: mukesh2306/devops-roadmap-backend:latest
        env:
        - name: DATABASE_URL
          value: postgresql://postgres:password@postgres-service.devops-roadmap.svc.cluster.local:5432/devops_roadmap
        - name: PORT
          value: "3001"
        ports:
        - containerPort: 3001
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: devops-roadmap
spec:
  selector:
    app: backend
  ports:
  - port: 3001
    targetPort: 3001
