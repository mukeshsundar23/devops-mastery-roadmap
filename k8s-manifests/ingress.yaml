apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: devops-roadmap-ingress
spec:
  rules:
  - host: mukeshdev.online
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-service
            port:
              number: 80
  - host: api.mukeshdev.online
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: backend-service
            port:
              number: 3001
