# Nginx config template — BACKEND_URL is substituted at container startup via envsubst.
# React calls /api/* → Nginx proxies to the Python backend.
# No CORS. No absolute URLs in JS. No mixed-content issues.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── API proxy ──────────────────────────────────────────────────────────────
    # Forwards /api/* to the FastAPI backend (URL injected at runtime).
    location /api/ {
        proxy_pass ${BACKEND_URL};
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── Static assets ──────────────────────────────────────────────────────────
    location ~* \.(html|svg|ico)$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|woff2?|ttf|eot)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # ── SPA fallback ───────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
